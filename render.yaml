services:
  - type: web
    name: tillian-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0
      - fromDatabase:
          name: tillian-db
          property: connectionString
        key: DATABASE_URL

databases:
  - name: tillian-db
    plan: free # Change to 'standard' for production reliability
